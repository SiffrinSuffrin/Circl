# Scans the incoming PR; checks head branch and runs tests
name: Unit Testing

on:
  push:
    branches:
      - "**"
  pull_request:
    branches:
      - main
    types:
      - opened
      - reopened
      - synchronize
      - edited

jobs:
  test:
    runs-on: ubuntu-slim
    steps:
      # Initialize Python on the runner
      - uses: actions/checkout@v6
      - name: Set up Python 3.12
        uses: actions/setup-python@v6
        with:
          python-version: 3.12

      # Use pyproject.toml to install declared dependencies, if any are found
      - name: Install dependencies
        run: pip install .

      # Unit test all files with the prefix 'test_' in the name
      - name: Run unit tests
        run: python -m unittest discover -s . -p 'test_*.py'